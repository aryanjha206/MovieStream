{% extends "base.html" %}

{% block title %}MovieStream | Admin{% endblock %}

{% block content %}
<section class="single-auth" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="auth-panel" style="width: 100%; max-width: 400px; padding: 40px; background: var(--mx-bg-alt); border-radius: var(--radius-lg);">
        <h1 style="font-size: 28px; margin-bottom: 8px;">Admin Login</h1>
        <p style="color: var(--mx-text-dim); margin-bottom: 32px;">Please enter your identification PIN.</p>
        <form method="post" action="{{ url_for('admin_login') }}" class="stack-form">
            <div class="form-group">
                <input type="password" name="pin" placeholder="Enter PIN" required style="text-align: center; font-size: 24px; letter-spacing: 12px;">
            </div>
            <button type="submit" class="button-primary">Authorize</button>
        </form>
    </div>
</section>
{% endblock %}
