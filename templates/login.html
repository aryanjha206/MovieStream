{% extends "base.html" %}

{% block title %}Login | MovieStream Premium{% endblock %}

{% block content %}
<section class="single-auth">
    <div class="auth-panel glass">
        <span class="eyebrow" style="margin-bottom: 16px;">Welcome Back</span>
        <h1 style="font-size: 32px; font-weight: 800; margin-bottom: 8px;">Sign In</h1>
        <p style="color: var(--mx-text-dim); margin-bottom: 32px;">Access your library and continue streaming.</p>
        
        <form method="post" action="{{ url_for('login') }}" class="stack-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Security Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <div style="margin: 8px 0 24px;">
                <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                    <input type="checkbox" name="accept_terms" id="accept_terms" required style="width: 20px; height: 20px;">
                    <span style="font-size: 13px; color: var(--mx-text-dim);">I am 18+ and accept the Terms & Conditions.</span>
                </label>
            </div>
            <button type="submit" class="button-apply" style="width: 100%;">Continue Exploring</button>
        </form>
        
        <p style="margin-top: 32px; text-align: center; font-size: 14px; color: var(--mx-text-dim);">
            New user? <a href="{{ url_for('signup') }}" style="color: var(--mx-accent); text-decoration: none; font-weight: 700;">Create premium account</a>
        </p>
    </div>
</section>
{% endblock %}
