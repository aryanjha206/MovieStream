{% extends "base.html" %}

{% block title %}MovieStream | Admin{% endblock %}

{% block content %}
<section class="single-auth">
    <div class="auth-panel">
        <span class="eyebrow">Restricted</span>
        <h1>Admin sign in</h1>
        <p>Enter your PIN.</p>
        <form method="post" action="{{ url_for('admin_login') }}" class="stack-form">
            <label>Admin PIN</label>
            <input type="password" name="pin" placeholder="Enter PIN" required>
            <button type="submit" class="button button-primary">Continue</button>
        </form>
    </div>
</section>
{% endblock %}
