{% extends "base.html" %}

{% block title %}MovieStream | Login{% endblock %}

{% block content %}
<section class="single-auth" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="auth-panel" style="width: 100%; max-width: 400px; padding: 40px; background: var(--mx-bg-alt); border-radius: var(--radius-lg);">
        <h1 style="font-size: 28px; margin-bottom: 8px;">Login</h1>
        <p style="color: var(--mx-text-dim); margin-bottom: 32px;">Welcome back to MovieStream.</p>
        
        <form method="post" action="{{ url_for('login') }}" class="stack-form">
            <div class="form-group">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <div style="margin-bottom: 24px; display: flex; align-items: flex-start; gap: 10px;">
                <input type="checkbox" name="accept_terms" id="accept_terms" required style="width: 18px; height: 18px; margin-bottom: 0;">
                <label for="accept_terms" style="font-size: 13px; color: var(--mx-text-dim);">I am 18+ and accept the Terms & Conditions.</label>
            </div>
            <button type="submit" class="button-primary">Continue</button>
        </form>
        <p style="margin-top: 24px; text-align: center; font-size: 14px; color: var(--mx-text-dim);">
            New user? <a href="{{ url_for('signup') }}" style="color: var(--mx-accent); text-decoration: none; font-weight: 700;">Create account</a>
        </p>
    </div>
</section>
{% endblock %}
