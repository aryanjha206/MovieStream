{% extends "base.html" %}

{% block title %}MovieStream | Login{% endblock %}

{% block content %}
<section class="single-auth">
    <div class="auth-panel glass">
        <span class="eyebrow">Welcome Back Member</span>
        <h1>Sign in to Stream</h1>
        <p>Instant access to your personalized catalog.</p>
        <form method="post" action="{{ url_for('login') }}" class="stack-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="e.g. aryan@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="checkbox-row">
                <input type="checkbox" name="accept_terms" id="accept_terms" required>
                <label for="accept_terms">I confirm that I am at least 18 years old and accept the Terms & Conditions.</label>
            </div>
            <button type="submit" class="button button-primary" style="width: 100%;">Sign In Now</button>
        </form>
        <p class="muted-copy" style="margin-top: 24px; text-align: center;">New to MovieStream? <a href="{{ url_for('signup') }}" style="color: var(--accent); font-weight: 700;">Join today</a></p>
    </div>
</section>
{% endblock %}
