{% extends "base.html" %}

{% block title %}Login | MovieStream Elite{% endblock %}

{% block body_class %}auth-page{% endblock %}

{% block content %}
<section class="single-auth">
    <div class="auth-panel">
        <h1
            style="font-size: 40px; font-weight: 950; margin-bottom: 8px; font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.04em;">
            Welcome Back</h1>
        <p style="color: var(--mx-text-dim); margin-bottom: 40px; font-size: 16px;">Step into your personal cinema
            portal.</p>

        <form method="post" action="{{ url_for('login') }}" class="stack-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@premium.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label>Security Password</label>
                    <a href="#"
                        style="font-size: 12px; color: var(--mx-accent); text-decoration: none; font-weight: 700;">Reset?</a>
                </div>
                <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <div style="margin: 10px 0 30px;">
                <label style="display: flex; align-items: center; gap: 14px; cursor: pointer; user-select: none;">
                    <input type="checkbox" name="accept_terms" id="accept_terms" required
                        style="width: 22px; height: 22px; accent-color: var(--mx-accent); border-radius: 6px;">
                    <span style="font-size: 14px; color: var(--mx-text-dim); line-height: 1.4;">I confirm I am over 18
                        and agree to the <strong style="color: var(--mx-text);">Terms of Service</strong>.</span>
                </label>
            </div>
            <button type="submit" class="btn-elite"
                style="width: 100%; padding: 18px; font-size: 16px; border-radius: 18px;">Access Theater</button>
        </form>

        <div style="margin-top: 40px; text-align: center; border-top: 1px solid var(--mx-border); padding-top: 30px;">
            <p style="font-size: 15px; color: var(--mx-text-dim);">
                New to MovieStream Elite? <br>
                <a href="{{ url_for('signup') }}"
                    style="color: var(--mx-accent); text-decoration: none; font-weight: 800; margin-top: 8px; display: inline-block;">Create
                    Premium Membership</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
